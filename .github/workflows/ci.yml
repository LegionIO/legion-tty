name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: LegionIO/.github/.github/workflows/ci.yml@main

  release:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: LegionIO/.github/.github/workflows/release.yml@main
    secrets:
      rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}

  trigger-homebrew:
    needs: release
    if: needs.release.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tty build
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
        run: |
          gh api repos/LegionIO/homebrew-tap/dispatches \
            -f event_type=build-tty \
            -f "client_payload[legion_tty_version]=${{ needs.release.outputs.version }}"
